<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('aurora-theme');
          if (!t) {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.setAttribute('data-mood', 'clouds');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.setAttribute('data-mood', 'clouds');
        }
      })();
    </script>
    <title>Aurora Weather — Modern Weather Dashboard</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <meta name="description" content="Aurora Weather is a modern, responsive Angular dashboard with real-time conditions, forecasts, maps, and alerts." />
