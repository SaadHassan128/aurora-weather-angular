<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5CC8FF"/>
      <stop offset="50%" stop-color="#7D7BFF"/>
      <stop offset="100%" stop-color="#66F0A0"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#FFE07A"/>
      <stop offset="100%" stop-color="#FDBA5E"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset in="blur" dx="0" dy="1" result="offset"/>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="12" fill="none"/>

  <path d="M10 42 C16 30, 30 26, 44 32 C52 35, 58 30, 62 24" stroke="url(#aurora)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>

  <circle cx="40" cy="22" r="10" fill="url(#sun)" filter="url(#soft)"/>

  <g filter="url(#soft)">
    <path d="M22 40
             c0 -5 5 -9 11 -9
             c4 0 7 2 9 5
             c5 -1 9 3 9 7
             c0 4 -3 7 -8 7
             h-17
             c-6 0 -10 -4 -10 -9
             c0 -1 0 -1 6 -1z"
          fill="#FFFFFF" opacity="0.95"/>
  </g>

  <path d="M14 50 h36" stroke="url(#aurora)" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
